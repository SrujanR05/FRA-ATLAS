services:
  db:
    image: postgis/postgis:16-3.4
    container_name: fra_atlas_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fra_atlas}
      POSTGRES_USER: ${POSTGRES_USER:-fra_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fra_admin}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fra_admin} -d ${POSTGRES_DB:-fra_atlas}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fra_atlas_api
    env_file:
      - ./.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://fra_admin:fra_admin@db:5432/fra_atlas}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/reports:/app/reports

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fra_atlas_web
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
